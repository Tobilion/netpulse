<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetPulse — ISP Performance Tracker</title>
  <meta name="description" content="Real-time ISP performance dashboard. Track download speed, upload speed, ping, and uptime trends over time with NetPulse.">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0c10'/%3E%3Cpath d='M8 32h12l6-16 12 32 6-16h12' fill='none' stroke='%2338bdf8' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">

  <!-- Styles -->
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/components.css">

  <!-- Chart.js (global, loaded before modules) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- A7: Scroll Progress Bar -->
  <div id="scrollProgress" class="scroll-progress-bar" aria-hidden="true"></div>

  <!-- A4: Ambient GlowOrbs (positioned behind everything via CSS) -->
  <div class="glow-orb orb-1" aria-hidden="true"></div>
  <div class="glow-orb orb-2" aria-hidden="true"></div>
  <div class="glow-orb orb-3" aria-hidden="true"></div>

  <!-- ───────── HEADER ───────── -->
  <header class="site-header">
    <div class="logo">
      <!-- Logo mark SVG -->
      <svg width="28" height="28" viewBox="0 0 64 64" fill="none"
        xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="64" height="64" rx="14" fill="#0a0c10"/>
        <path d="M8 32h12l6-16 12 32 6-16h12" fill="none"
          stroke="#38bdf8" stroke-width="4"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-wordmark">Net<span class="grad-text">Pulse</span></span>
    </div>

    <!-- A5: TubelightNav — range picker -->
    <nav class="tubelight-nav" id="rangePicker" aria-label="Time range selector">
      <div class="nav-pill" aria-hidden="true"></div>
      <button data-range="24h" id="range-24h">24h</button>
      <button data-range="7d"  id="range-7d" class="active">7d</button>
      <button data-range="30d" id="range-30d">30d</button>
      <button data-range="all" id="range-all">All</button>
    </nav>
  </header>

  <!-- ───────── HERO ───────── -->
  <section class="hero" aria-labelledby="heroHeadline">
    <p class="section-label">LIVE PERFORMANCE</p>

    <!-- A6: TextScramble target — height reserved by min-height in CSS -->
    <h1 id="heroHeadline" class="hero-headline">Loading your network data…</h1>

    <div class="hero-meta">
      <!-- A9: ProgressRing (uptime) — filled by createProgressRing() in JS -->
      <div class="progress-ring-container" id="uptimeRingContainer"
        aria-label="Uptime progress ring"></div>

      <div class="uptime-meta">
        <div class="uptime-value"  id="uptimeValue">–</div>
        <div class="uptime-subtitle" id="uptimeSubtitle">Uptime</div>
      </div>

      <!-- Last measured pill -->
      <div class="last-measured-pill" id="lastMeasuredPill" aria-live="polite">
        <span class="pulse-dot" aria-hidden="true"></span>
        last measured —
      </div>
    </div>
  </section>

  <!-- ───────── MAIN CONTENT ───────── -->
  <main class="main-content">

    <!-- A8: AnimatedCounter stat cards (A1: SpotlightCard + TiltCard) -->
    <section aria-label="Network statistics">
      <p class="section-label">NETWORK STATS</p>
      <!-- A10: SkeletonLoader shown here while data loads; replaced by stat cards -->
      <div class="stats-grid" id="statsGrid" aria-live="polite"></div>
    </section>

    <!-- Charts section — hidden when DB is empty -->
    <section id="chartsSection" aria-label="Performance charts">

      <!-- A1: SpotlightCard wrapping each chart -->
      <div class="chart-card spotlight-card" id="speedChartCard">
        <div class="chart-header">
          <p class="section-label">THROUGHPUT</p>
          <h2>Download &amp; Upload Speed</h2>
        </div>
        <div class="chart-wrap">
          <canvas id="speedChart" aria-label="Download and upload speed over time"></canvas>
        </div>
      </div>

      <div class="chart-card spotlight-card" id="latencyChartCard">
        <div class="chart-header">
          <p class="section-label">LATENCY</p>
          <h2>Ping &amp; Response Times</h2>
        </div>
        <div class="chart-wrap">
          <canvas id="latencyChart" aria-label="Ping latency over time"></canvas>
        </div>
      </div>

      <div class="chart-card spotlight-card" id="hourlyChartCard">
        <div class="chart-header">
          <p class="section-label">DAILY PATTERNS</p>
          <h2>Average Download Speed by Hour</h2>
        </div>
        <div class="chart-wrap">
          <canvas id="hourlyChart" aria-label="Average download speed per hour of day"></canvas>
        </div>
      </div>

    </section>

    <!-- A12: EmptyState shown above if no data; outage log shown otherwise -->
    <section class="outages-section" id="outagesSection" aria-label="Outage log">
      <p class="section-label">INCIDENTS</p>
      <h2 class="section-title">Outage Log</h2>
      <!-- A13: Outage cards — clicking opens Modal -->
      <div id="outagesList" aria-live="polite"></div>
    </section>

  </main>

  <!-- ───────── FOOTER ───────── -->
  <footer class="site-footer">
    <p>
      NetPulse — ISP performance tracker by
      <a href="https://tobiloba-jagun-portfolio.vercel.app"
        target="_blank" rel="noopener noreferrer">Tobiloba Jagun</a>
    </p>
  </footer>

  <!-- A13: Modal — outage detail -->
  <div id="outageModal" class="modal-backdrop" hidden
    role="dialog" aria-modal="true" aria-labelledby="modalHeading">
    <div class="modal-panel">
      <button class="modal-close" id="modalClose" aria-label="Close modal">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <line x1="1" y1="1" x2="13" y2="13"/>
          <line x1="13" y1="1" x2="1" y2="13"/>
        </svg>
      </button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- A11: Toast container -->
  <div id="toastContainer" class="toast-container"
    aria-live="polite" aria-atomic="false"></div>

  <!-- ES module entry point (imports components.js + charts.js) -->
  <script type="module" src="/static/js/app.js"></script>

</body>
</html>
